server {
    listen 80;
    server_name localhost;
    
    # 1. The Root Directory
    # This must match the path INSIDE the container, not your host.
    root /var/www/html/public;

    # 2. The Fallback Logic
    # If a file exists (style.css), serve it.
    # If not, rewrite the request to index.php (The Front Controller).
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # 3. The PHP Connector
    # This captures any request ending in .php (or the rewritten ones).
    location ~ ^/index\.php(/|$) {
        # The service name defined in docker-compose.yml
        fastcgi_pass backend:9000;
        
        # Standard splitting for path info
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        
        include fastcgi_params;

        # Tell PHP-FPM exactly where the file is on ITS file system
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        
        # Optimization: Don't buffer heavy PHP responses, stream them
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        
        # Prevent "faking" the execution of non-existent PHP files
        internal;
    }

    # 4. Logs (Optional but good for debugging)
    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}